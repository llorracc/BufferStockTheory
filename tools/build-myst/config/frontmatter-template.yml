# YAML frontmatter skeleton. Phase 10 (10_assemble_frontmatter.py) reads this
# template and fills in `title`, `authors`, `abstract` etc. from the source
# TeX. Fields with `null` here are filled at build time; fields with literal
# values are emitted as-is.

title:        null   # filled from \title{}
short_title:  Buffer Stock Theory
authors:      null   # filled from \author{}; supports name+affiliation+email
date:         null   # filled from \date{} (or \today)
keywords:     null   # filled from \keywords{}
jel:          null   # filled from \jelclass{}
abstract:     null   # filled from \begin{abstract}...\end{abstract}
license:      null   # not specified by source; left blank
math:                # KaTeX-friendly macro shortcuts; mirrors econark-math-macros.tex
