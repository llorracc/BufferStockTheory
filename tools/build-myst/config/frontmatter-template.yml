  '\PermShkFac':   '\psi'
  '\Ex':           '\mathbb{E}'
  '\mLvl':         '\mathbf{m}'
  '\pLvl':         '\mathbf{p}'
  '\cLvl':         '\mathbf{c}'
  '\mNrm':         'm'
  '\cNrm':         'c'
  '\aNrm':         'a'
  '\vFunc':        'v'
  '\cFunc':        'c'
  '\vFuncLvl':     '\mathbf{v}'
  '\uFunc':        'u'
  '\APFac':        'Ϸ'
  '\APFacRaw':     '(R\beta)^{1/\rho}'
  '\Thorn':        'Ϸ'
  '\GIC':          '\textsf{GIC}'
