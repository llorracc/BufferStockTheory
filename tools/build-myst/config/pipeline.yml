# Pipeline configuration. Paths are relative to the BST repo root
# (resolved by lib/safe_io.py:repo_root()).

source:
  master_tex:        BufferStockTheory.tex
  bbl:               docs/BufferStockTheory.bbl
  public_bib:        BufferStockTheory-Add-Refs.bib

build_dir:           _build/myst
static_dir:          _static
output_md:           BufferStockTheory.md

# Phase-specific knobs ------------------------------------------------------

phase_01_resolve_inputs:
  keep_comments: false
  expand_bbl:    true

phase_02_strip_conditionals:
  drop_envs:
    - comment
  drop_argkillers:   true
  keep_acknowledgements_as_frontmatter: true

phase_03_normalize_macros:
  generic_text_macros:
    "\\REMARK":    REMARK
    "\\ARKurl":    Econ-ARK
    "\\owner":     llorracc
  drop_macros:
    - "\\subname"
    - "\\authNum"
    - "\\inframe"
  rename_macros:
    "\\labelsafe": "\\label"

phase_04_pandoc:
  flags:
    - "--from=latex"
    - "--to=markdown_strict+definition_lists+fenced_code_attributes+grid_tables+header_attributes+link_attributes+raw_attribute+tex_math_dollars+pipe_tables+table_captions+yaml_metadata_block+pipe_tables+backtick_code_blocks+strikeout+autolink_bare_uris+footnotes+task_lists+inline_notes"
    - "--wrap=preserve"
    - "--markdown-headings=atx"
    - "--reference-links=false"
    - "--shift-heading-level-by=0"

phase_05_resolve_citations:
  unresolved_marker: "[??{key}??]"
  references_heading: "## References"
  references_anchor_prefix: ""        # `(citekey)=` form

phase_07_theorem_envs:
  mapping_file: theorem-mapping.yml

phase_08a_paragraphs_and_figs:
  paragraph_heading_level: 3          # \paragraph → ### (not ####)

phase_08b_named_condition_glosses:
  config_file: named-conditions.yml

phase_11_validate:
  smoke_probes_min_growth_impatience_count: 5
  required_substrings:
    - "## References"
  forbidden_substrings:
    - "<<CITE:"
    - "<<NAMED:"
    - "<<ANCHOR:"
    - "<<XREF:"
    - "\\hyperlink{"
    - "\\citep{"
    - "\\citet{"
    - "\\input{"
    - "[??"
  privacy_patterns:
    - "private"
    - "@local"
    - "paperpile_private"
    - "@todo"
    - "/Volumes/"
    - "/Users/"
