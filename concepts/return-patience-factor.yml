id: return-patience-factor
name: Return Patience Factor (RPF)
short: RPF
defining_equation:
  anchor: ass-RIC
  latex: \RPFac := \APFac/\Rfree
  english: 'Ratio of the absolute patience factor to the gross interest factor.'
gloss: |
  The return patience factor $\RPFac := \APFac/\Rfree$ is the patience-factor analogue of the consumer's preferred-consumption-growth-vs-return comparison. When $\RPFac < 1$ (RIC), the consumer's preferred consumption-growth rate $\APFac$ is below the gross interest factor $\Rfree$ — equivalently, the consumer is willing to forgo enough consumption today to let interest accumulate, so wealth is being drawn down rather than building up indefinitely.

  RPF appears throughout the perfect-foresight benchmark results: the limiting marginal propensity to consume out of total wealth is $\MPCmin = 1 - \RPFac$, which is positive iff RIC holds; the natural-borrowing-constraint limiting consumption function is built from $\RPFac$-based recursions; and WRIC weakens RIC by adjusting the patience side (multiplying by $\pZero^{1/\CRRA}$) rather than the return side, which means WRIC is the inequality $\pZero^{1/\CRRA} \RPFac < 1$.

  RPF is one of four patience factors sharing the same numerator $\APFac$ but differing in denominator. The other three: $\APFac$ itself (denominator $1$, gives AIC), $\GPFacRaw = \APFac/\PermGroFac$ (denominator $\PermGroFac$, gives GIC), and $\GPFacMod = \APFac/\PermGroFacAdj$ (denominator $\PermGroFacAdj$, the uncertainty-adjusted growth factor, gives GIC-Mod). RPF stands apart from the growth siblings by using $\Rfree$ — the *return* comparison rather than the growth comparison.
relations:
  - kind: requires
    target: absolute-patience-factor
    note: '$\RPFac = \APFac/\Rfree$ is built from $\APFac$.'
  - kind: assumed-by
    target: return-impatience-condition
    note: 'RIC is exactly the inequality $\RPFac < 1$.'
  - kind: assumed-by
    target: weak-return-impatience-condition
    note: 'WRIC is the probability-adjusted inequality $\pZero^{1/\CRRA} \RPFac < 1$.'
  - kind: contrasts-with
    target: growth-patience-factor
    note: 'RPF and GPF share numerator $\APFac$ and differ in denominator: RPF uses $\Rfree$, GPF uses $\PermGroFac$.'
sources:
  - file: BufferStockTheory.md
    anchor: ass-RIC
  - file: BufferStockTheory.md
    anchor: RIC
