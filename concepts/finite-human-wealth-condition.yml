id: finite-human-wealth-condition
name: Finite Human Wealth Condition (FHWC)
short: FHWC
defining_equation:
  anchor: ass-FHWC
  latex: \RNrmByG^{-1} = \PermGroFac/\Rfree < 1
  english: 'The expected permanent income growth factor is smaller than the gross interest factor.'
gloss: |
  FHWC says the discounted growth factor $\RNrmByG^{-1} = \PermGroFac/\Rfree$ is below 1, equivalently $\Rfree > \PermGroFac$. This is the condition under which the present-discounted value of an infinite stream of permanent-income payments is finite — that is, "human wealth" $\hLvl_{t}$ converges as the horizon extends.

  Without FHWC, the consumer in the perfect-foresight unconstrained problem could borrow against an infinite present-value stream of future income; the limiting consumption function would diverge. FHWC is the natural counterpart to the consumer's no-Ponzi condition, and is the second of the two ingredients (with RIC) that produce a non-degenerate limiting solution in the perfect-foresight unconstrained case (proposition `prop-pfUCFHWC`).

  In the stochastic case FHWC is no longer a stated assumption of the existence theorems for buffer-stock target / pseudo-target — those rely on FVAC, GIC/GIC-Mod, and (W)RIC. But many of the qualitative conditions relating GIC, RIC, FVAC are conditional on FHWC (e.g., "under FHWC, GIC implies FVAC"; see `claim-PFConspC`).
relations:
  - kind: assumed-by
    target: prop-pfUCFHWC
    note: 'Non-degenerate limiting solution exists iff FHWC and RIC both hold.'
  - kind: contrasts-with
    target: return-impatience-condition
    note: 'FHWC concerns whether human wealth is finite; RIC concerns whether the consumer wants to deplete it.'
  - kind: requires
    target: ass-pfincome
    note: 'FHWC presupposes the perfect-foresight income process used to define human wealth $\hLvl_t$.'
sources:
  - file: BufferStockTheory.md
    anchor: ass-FHWC
  - file: BufferStockTheory.md
    anchor: eq-FHWC2
bellman_ddsl:
  perch: '(deferred)'
  stage: '(deferred)'
