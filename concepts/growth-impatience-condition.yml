id: growth-impatience-condition
name: Growth Impatience Condition (GIC)
short: GIC
defining_equation:
  anchor: ass-GICRaw
  latex: \GPFacRaw < 1
  english: 'The absolute patience factor falls short of the permanent income growth factor.'
gloss: |
  GIC says the absolute patience factor $\APFac := (\Rfree\DiscFac)^{1/\CRRA}$ is smaller than the expected permanent income growth factor $\PermGroFac$, so that the ratio $\GPFacRaw := \APFac/\PermGroFac$ is below 1.

  In a perfect-foresight setting GIC implies that consumption growth is slower than permanent income growth, so the consumer's wealth-to-permanent-income ratio drifts down over time rather than up. Together with finite human wealth (FHWC), GIC is sufficient for finite value of autarky (FVAC), which in turn implies return impatience (RIC); see the implication chain established in the proof of the perfect-foresight benchmarks.

  GIC is the weaker of the two patience conditions used in the existence theorems for the stochastic problem. The stronger sibling, "strong growth impatience" (GIC-Mod), additionally takes the expectation over the permanent shock and is required for existence of an *individual* buffer-stock target. GIC alone is sufficient for the *aggregate* "pseudo-target" (theorem `thm-MSSBalExists`).
relations:
  - kind: requires
    target: growth-patience-factor
    note: 'GIC is exactly the inequality $\GPFacRaw < 1$.'
  - kind: requires
    target: absolute-patience-factor
    note: 'Transitively: $\GPFacRaw = \APFac/\PermGroFac$ is built from $\APFac$.'
  - kind: contrasts-with
    target: return-impatience-condition
    note: 'GIC is about growth (ratio of patience factor to growth factor); RIC is about return (ratio of patience factor to interest factor).'
  - kind: implies
    target: finite-value-of-autarky
    note: 'Under FHWC, GIC implies FVAC (claim-PFConspC).'
  - kind: assumed-by
    target: pseudo-target
    note: 'The pseudo-target existence theorem requires GIC (together with WRIC and FVAC).'
  - kind: implied-by
    target: strong-growth-impatience-condition
    note: 'GIC-Mod is a strengthened sibling adding an expectation over the permanent shock; by Jensen, GIC-Mod implies GIC.'
sources:
