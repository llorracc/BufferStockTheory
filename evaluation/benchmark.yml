# === CROSS-PAPER / DDSL BRIDGE (4) ====================================

- id: q17-xref-bellman-ddsl-perches
  category: cross-paper
  question: 'How would the consumer''s decision problem in this paper be expressed in bellman-ddsl perches and stages?'
  expected_answer: |
    In the bellman-ddsl framework, a consumer's single-period
    consumption-saving problem corresponds to a stage with
    perches representing the agent's state, choice, and
    continuation. The paper's normalised recursive Bellman
    eq-veqnNrmRecBellman has \mNrm_t as the incoming state
    perch, \cNrm_t as the choice perch, and post-decision
    end-of-period assets \aNrm_t = \mNrm_t - \cNrm_t feeding
    into the next period's state via the transition
    \mNrm_{t+1} = \RNrmByGRnd \aNrm_t + \tranShkAll_{t+1}. The
    repository's HARK example ConsPerfForesight_mdp.md is the
    nearest perfect-foresight analogue.
  expected_sources:
    - file: BufferStockTheory.md
      anchor: eq-veqnNrmRecBellman
  expected_chunks:
    - BufferStockTheory-NoAppendix.tex
    - ConsPerfForesight_mdp.md
  notes: 'Cross-repo question — should pull both BST and bellman-ddsl chunks.'
  difficulty: 4

- id: q18-xref-szeidl-contrast
  category: cross-paper
  question: 'How does this paper''s approach contrast with Szeidl (2013)?'
  expected_answer: |
    Szeidl (2013) (cite-szeidlInvariant) showed that the standard
    impatience condition \DiscFac \Rfree < 1 commonly imposed in
    Bewley models is in general neither necessary nor sufficient
    for existence of a non-degenerate limiting solution. This
    paper builds on that observation by articulating the more
    nuanced family of patience conditions (AIC, RIC, GIC,
    GIC-Mod, FVAC) that *are* the right conditions in the
    presence of nonstationary permanent income, and uses Szeidl's
    log-GIC condition (eq-GICSdl) to characterise existence of
    invariant cross-sectional distributions in Section
    subsec-cGroEqPermGroFacQ.
  expected_sources:
    - file: BufferStockTheory.md
      anchor: GICSdl
    - file: BufferStockTheory.md
      anchor: eq-GICSdl
  expected_chunks:
    - BufferStockTheory-NoAppendix.tex
    - Introduction.tex
  difficulty: 3

- id: q19-xref-income-fluctuation-literature
  category: cross-paper
  question: 'Where does the paper discuss the income-fluctuation problem literature, and which key papers does it cite?'
  expected_answer: |
    The paper discusses the income-fluctuation literature in the
    Introduction, treating "Bewley model" and "income fluctuation
    problem" as synonyms. Key cited works include Bewley (1977,
    cite-bewleyPIH) — the original framework; Schectman (1976,
    cite-schectman-fluctuation) — the original income-fluctuation
    formulation; Aiyagari (1994, cite-aiyagari-ge) — natural
    borrowing constraint; and Ma, Stachurski and Toda (2020,
    2022a, cite-mstIncFluct, cite-maUnboundedDP) — the most
    general recent results, which the paper notes are
    inapplicable here because they require an artificial
    constraint and a positive minimum income, whereas this
    paper handles unbounded permanent income with no artificial
    constraint.
  expected_sources:
    - file: BufferStockTheory.md
      anchor: cite-bewleyPIH
    - file: BufferStockTheory.md
      anchor: cite-schectman-fluctuation
    - file: BufferStockTheory.md
      anchor: cite-mstIncFluct
  expected_chunks:
    - BufferStockTheory-NoAppendix.tex
    - Introduction.tex
  difficulty: 2

- id: q20-xref-mst-comparison
  category: cross-paper
  question: 'How does this paper''s strong growth-impatience condition (GIC-Mod) compare to the impatience condition Ma, Stachurski, and Toda (2020) use to guarantee stability?'
  expected_answer: |
    The paper notes that since \CRRA > 1, the strong
    growth-impatience condition GIC-Mod is *weaker* than the
    Ma, Stachurski, and Toda (2020) impatience condition
    \DiscFac \Ex[\Rnd{\PermGroFac}_{t+1}^{1-\CRRA}] \RNrmByGRnd
    < 1 used in their stability proof. So GIC-Mod is the milder
    condition: any model satisfying the MST stability condition
    also satisfies GIC-Mod, but not vice versa. The paper relies
    on GIC-Mod (together with WRIC and FVAC) for individual
    buffer-stock target existence rather than the stronger MST
    condition.
  expected_sources:
    - file: BufferStockTheory.md
      anchor: ass-GICMod
    - file: BufferStockTheory.md
      anchor: cite-mstIncFluct
  expected_chunks:
    - BufferStockTheory-NoAppendix.tex
  difficulty: 4
