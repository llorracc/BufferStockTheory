- id: q16-calib-Rfree-value
  category: calibration
  question: 'What value of the gross interest factor \Rfree does the paper use in its baseline calibration, and what does the corresponding finite-human-wealth factor evaluate to?'
  expected_answer: |
    The baseline calibration uses \Rfree = 1.04 (labelled
    "Conventional"), together with \PermGroFac = 1.03. Hence the
    finite-human-wealth factor \RNrmByGRnd^{-1} = \PermGroFac/\Rfree
