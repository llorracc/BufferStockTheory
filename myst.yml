# See docs at: https://mystmd.org/guide/frontmatter
version: 1
# KaTeX math-macro definitions live in mystmd-math-macros.yml at repo
# root, regenerated by Phase 00 of the LaTeX-to-MyST pipeline from
# @resources/markdown/econark-shortcuts.md. extends: pulls them into the
# project so equations like $\APFac < \PermGroFac$ resolve at render
# time. Without this, `myst build --strict` fails with hundreds of
# "Undefined control sequence" errors.
extends:
  - mystmd-math-macros.yml
project:
  id: 18644e62-9f0e-489c-aa6b-1d644bc0720d
  github: https://github.com/llorracc/BufferStockTheory-Latest
  # Bibliography source for native MyST citation handling. Now that
  # BufferStockTheory.bib is a tracked, stable artifact (refreshed via
  # `make refresh-bib` after editing system.bib), mystmd can ingest it
  # directly. The pipeline still resolves in-page citation prose via
  # phase 5; pointing mystmd at the .bib here is defence-in-depth and
  # a hook for future native-citation work.
  bibliography:
    - BufferStockTheory.bib
  # The published site mirrors `pdflatex BufferStockTheory.tex` exactly:
  # one page (BufferStockTheory.md), produced by tools/build-myst/.
  # Do NOT add other entries here without updating BufferStockTheory.tex
  # to actually \subfile{} them — the two must stay in sync.
  toc:
    - file: BufferStockTheory.md
  # Defence-in-depth: even if a future contributor accidentally drops the
  # toc:, these patterns keep mystmd away from non-paper content.
  exclude:
    - "BufferStockTheory-NoAppendix.*"   # slim variant
    - "BufferStockTheory-Slides.*"       # talk slides
    - "Appendices-All-Referenced.*"      # debug-only LaTeX collector
    - "Figures-All.*"                    # debug-only LaTeX collector
    - "Tables-All.*"                     # debug-only LaTeX collector
    - "Introduction.tex"                 # subfile, only read via \subfile
    - "Code/**"                          # source code & notebooks
    - "Calibration/**"
    - "Comparison/**"
    - "Equations/**"
    - "Figures/**"
    - "Tables/**"
    - "Appendices/**"                    # subfiles, inlined by tools/build-myst
    - "LaTeX/**"
    - "Slides/**"
    - "Related/**"
    - "docs/**"                          # auto-generated mirror tree
    - "plans_private/**"                 # private workflow notes
    - "tools/**"                         # the pipeline itself
    - "@local/**"                        # private path-config macros
    - "@resources/**"                    # shared TeX search-path stash
    - "**/Old/**"                        # any nested archive folders
    - "**/HarKmenberg/**"                # bundled third-party tree
    - "**/__pycache__/**"
    - "**/.specstory/**"
    - "**/.pytest_cache/**"
    - "**/HARK_ask-your-project/**"      # symlinked sibling repo
    - "**/*_private*"                    # mirrors .ragignore
    - "**/private_*"
site:
  template: book-theme
